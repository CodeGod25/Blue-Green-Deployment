server {
    listen 80 default_server;
    server_name _;

    # Health check endpoint
    location = /healthz {
        default_type text/plain;
        return 200 "proxy-ok";
    }

    # API endpoints for monitor
    location /api/ {
        set $monitor_backend "http://monitor:8090";
        proxy_pass $monitor_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE Optimization
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # App route (Blue/Green Live Application)
    # The active_backend is defined in active-upstream.conf
    location /app/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://active_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_cache_control;
        
        # Error handling
        proxy_intercept_errors on;
    }

    # Direct Blue environment viewer (new window)
    location /blue/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://blue/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_cache_control;
    }

    # Direct Green environment viewer (new window)
    location /green/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://green/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_cache_control;
    }

    # Main dashboard
    location / {
        set $dashboard_backend "http://dashboard:80";
        proxy_pass $dashboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny suspicious requests
    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
    }
}

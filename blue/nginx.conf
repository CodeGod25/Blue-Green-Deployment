server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Health check endpoint
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
        access_log off;
    }

    # API version endpoint with JSON response
    location = /api/version {
        default_type application/json;
        return 200 '{"version":"Blue","release":"Stable Curriculum","track":"production","build":"2026.04.04-blue","notes":"Predictable pathways with high confidence modules"}';
        add_header Cache-Control "public, max-age=60" always;
        add_header Content-Type "application/json" always;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    gzip_min_length 256;

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|SVG|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Main location - SPA routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}

services:
  blue:
    build:
      context: ./blue
    container_name: blue-app
    networks:
      - blue-green-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 2s
      retries: 6

  green:
    build:
      context: ./green
    container_name: green-app
    networks:
      - blue-green-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 2s
      retries: 6

  proxy:
    image: nginx:1.27.0-alpine
    container_name: blue-green-proxy
    networks:
      - blue-green-network
    depends_on:
      blue:
        condition: service_healthy
      green:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 8

  monitor:
    build:
      context: ./monitor
    container_name: blue-green-monitor
    user: root # Required for Docker socket access (chaos engineering)
    networks:
      - blue-green-network
    depends_on:
      proxy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    environment:
      MONITORED_URL: http://proxy/
      PORT: "8090"
      STATE_FILE: /workspace/runtime/state.json
      DEMO_FILE: /workspace/runtime/demo_state.json
      EVENTS_FILE: /workspace/runtime/events.jsonl
      PROFILES_FILE: /workspace/profiles/deployments.json
    ports:
      - "${MONITOR_PORT:-8090}:8090"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ./runtime:/workspace/runtime
      - ./profiles:/workspace/profiles:ro
      - ./scripts:/workspace/scripts:ro
      - ./proxy/conf.d:/workspace/proxy/conf.d
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6

  dashboard:
    build:
      context: ./frontend
    container_name: blue-green-dashboard
    networks:
      - blue-green-network
    depends_on:
      proxy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 6

networks:
  blue-green-network:
    driver: bridge
